<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BlindTest Pro">
<meta name="theme-color" content="#06060F">
<title>🎵 BLINDTEST PRO</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Space+Mono:wght@700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   BLINDTEST PRO — NEON GAME SHOW REDESIGN v2
   ══════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow-x:hidden}
:root{
  --bg:#06060F;--bg2:#0D0D24;--bg3:#14142E;--bg4:#1B1B3A;
  --host:#F97316;--player:#22D3EE;--gold:#FCD34D;
  --green:#4ADE80;--red:#F87171;--purple:#C084FC;
  --glow-host:0 0 28px rgba(249,115,22,.4);
  --glow-player:0 0 28px rgba(34,211,238,.4);
  --glow-gold:0 0 28px rgba(252,211,77,.45);
  --glow-green:0 0 24px rgba(74,222,128,.4);
  --glow-red:0 0 24px rgba(248,113,113,.4);
  --glow-purple:0 0 24px rgba(192,132,252,.35);
  --tx:#F1F5F9;--tx2:#64748B;--tx3:#94A3B8;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);
  /* legacy */
  --p:var(--purple);--p2:#D8B4FE;--c:var(--player);--c2:#67E8F9;
  --y:var(--gold);--g:var(--green);--r:var(--red);
  --gp:var(--glow-purple);--gc:var(--glow-player);--gy:var(--glow-gold);
  --sidebar-w:0px;
}
body{background:var(--bg);color:var(--tx);font-family:'Nunito','Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-overflow-scrolling:touch;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 10% 15%,rgba(249,115,22,.055) 0%,transparent 50%),radial-gradient(ellipse at 90% 85%,rgba(34,211,238,.045) 0%,transparent 50%),radial-gradient(ellipse at 50% 45%,rgba(192,132,252,.03) 0%,transparent 65%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.022) 2px,rgba(0,0,0,.022) 4px);pointer-events:none;z-index:999}

/* ── LAYOUT ── */
#layout{display:flex;min-height:100vh;position:relative;z-index:1;width:100%;overflow-x:hidden}
#sidebar{display:none!important}
#main-content{margin-left:0;flex:1;display:flex;flex-direction:column;min-height:100vh;width:100%;overflow-x:hidden;padding-bottom:68px}
.screen{flex:1;padding:16px;width:100%;max-width:100%;overflow-x:hidden;animation:fadeIn .22s ease-out}

/* ── BOTTOM NAV ── */
#bottom-nav{display:block;position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,36,.97);backdrop-filter:blur(14px);border-top:1px solid var(--border2);z-index:100;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
.bnav-items{display:flex;justify-content:space-around}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 10px;cursor:pointer;color:var(--tx2);font-family:'Nunito',sans-serif;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;border:none;background:transparent;min-width:52px;transition:color .15s}
.bnav-item .bni{font-size:1.25rem;line-height:1}
.bnav-item.active,.bnav-item.active-c{color:var(--player)}
.bnav-item.active-y{color:var(--gold)}
.bnav-item.active-g{color:var(--green)}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes blink{50%{opacity:0}}
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
@keyframes shimmer{from{background-position:200% center}to{background-position:-200% center}}
@keyframes pulse-border{0%,100%{box-shadow:var(--glow-red)}50%{box-shadow:0 0 45px rgba(248,113,113,.75)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}70%{opacity:.9;transform:translateY(-70px) scale(1.4)}100%{opacity:0;transform:translateY(-110px) scale(1.1)}}
@keyframes toastIn{from{opacity:0;bottom:60px}to{opacity:1;bottom:80px}}
@keyframes countdownUrgent{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* ── TYPOGRAPHY ── */
h1{font-family:'Barlow Condensed','Impact',sans-serif;font-weight:900;font-size:clamp(2rem,8vw,4.5rem);letter-spacing:4px;text-transform:uppercase;line-height:1}
h2{font-family:'Barlow Condensed','Impact',sans-serif;font-weight:700;font-size:clamp(1.2rem,4vw,2rem);letter-spacing:2px;text-transform:uppercase}
h3{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:2.5px;color:var(--tx2);margin-bottom:10px}
.display{font-family:'Barlow Condensed','Impact',sans-serif;font-weight:900;letter-spacing:2px;text-transform:uppercase;line-height:1}
.mono{font-family:'Space Mono','Courier New',monospace;font-weight:700}

/* ── NEON TEXT ── */
.neon-host{color:var(--host);text-shadow:var(--glow-host)}
.neon-player{color:var(--player);text-shadow:var(--glow-player)}
.neon-gold{color:var(--gold);text-shadow:var(--glow-gold)}
.neon-green{color:var(--green);text-shadow:var(--glow-green)}
.neon-p{color:var(--purple);text-shadow:var(--glow-purple)}
.neon-c{color:var(--player);text-shadow:var(--glow-player)}
.neon-y{color:var(--gold);text-shadow:var(--glow-gold)}
.neon-g{color:var(--green);text-shadow:var(--glow-green)}
.neon-r{color:var(--red);text-shadow:var(--glow-red)}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.022) 0%,transparent 55%);pointer-events:none;border-radius:inherit}
.card-host{border-color:rgba(249,115,22,.32);box-shadow:0 0 0 1px rgba(249,115,22,.08),inset 0 1px 0 rgba(249,115,22,.05)}
.card-player{border-color:rgba(34,211,238,.28);box-shadow:0 0 0 1px rgba(34,211,238,.08),inset 0 1px 0 rgba(34,211,238,.05)}
.card-gold{border-color:rgba(252,211,77,.32);box-shadow:0 0 0 1px rgba(252,211,77,.08),inset 0 1px 0 rgba(252,211,77,.05)}
.card-green{border-color:rgba(74,222,128,.32);box-shadow:var(--glow-green)}
.card-red{border-color:rgba(248,113,113,.32);box-shadow:var(--glow-red)}
.card-glow{box-shadow:var(--glow-purple)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.9px;cursor:pointer;transition:all .12s ease;user-select:none;-webkit-user-select:none;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 60%);pointer-events:none}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.32;cursor:not-allowed;transform:none!important}
.btn-host{background:var(--host);color:#000;box-shadow:var(--glow-host)}
.btn-host:hover{filter:brightness(1.1)}
.btn-player{background:var(--player);color:#000;box-shadow:var(--glow-player)}
.btn-player:hover{filter:brightness(1.1)}
.btn-gold{background:var(--gold);color:#000;box-shadow:var(--glow-gold)}
.btn-gold:hover{filter:brightness(1.08)}
.btn-green{background:var(--green);color:#000;box-shadow:var(--glow-green)}
.btn-red{background:var(--red);color:#fff;box-shadow:var(--glow-red)}
.btn-outline{background:transparent;color:var(--tx3);border:1.5px solid var(--border2)}
.btn-outline:hover{border-color:var(--player);color:var(--player)}
.btn-ghost{background:rgba(255,255,255,.035);color:var(--tx2);border:1px solid var(--border2)}
.btn-ghost:hover{background:rgba(255,255,255,.065);color:var(--tx)}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid rgba(248,113,113,.32)}
.btn-danger:hover{background:rgba(248,113,113,.1)}
/* Legacy aliases */
.btn-p{background:var(--purple);color:#fff;box-shadow:var(--glow-purple)}
.btn-p:hover{filter:brightness(1.1)}
.btn-c{background:transparent;color:var(--player);border:1.5px solid var(--player);box-shadow:var(--glow-player)}
.btn-c:hover{background:rgba(34,211,238,.1)}
.btn-g{background:var(--green);color:#000}
.btn-g:hover{filter:brightness(1.1)}
.btn-r{background:var(--red);color:#fff}
.btn-y{background:var(--gold);color:#000;box-shadow:var(--glow-gold)}
.btn-y:hover{filter:brightness(1.08)}
.btn-lg{padding:14px 22px;font-size:.88rem}
.btn-sm{padding:7px 13px;font-size:.7rem}
.btn-full{width:100%}

/* ── INPUTS ── */
input[type=text]{background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;padding:12px 16px;color:var(--tx);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:600;width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input[type=text]:focus{border-color:var(--player);box-shadow:0 0 0 3px rgba(34,211,238,.14)}
input[type=text].inp-host:focus{border-color:var(--host);box-shadow:0 0 0 3px rgba(249,115,22,.14)}
input[type=text].inp-p:focus{border-color:var(--purple);box-shadow:var(--glow-purple)}

/* ── SEGMENTED CONTROL ── */
.seg{display:flex;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;overflow:hidden;flex-wrap:wrap}
.seg-btn{flex:1;min-width:0;padding:10px 4px;background:transparent;border:none;color:var(--tx2);font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;transition:all .15s;white-space:nowrap}
.seg-btn:hover:not(.active){background:rgba(255,255,255,.04);color:var(--tx3)}
.seg-btn.active{background:var(--player);color:#000}

/* ── PROGRESS BARS ── */
.prog-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--player));transition:width .1s linear;border-radius:3px}
.prog-fill.urgent{background:linear-gradient(90deg,var(--red),#FF8080)}

/* Full-width timer bar */
.timer-bar-wrap{height:6px;background:rgba(255,255,255,.055);border-radius:3px;overflow:hidden;margin-bottom:14px}
.timer-bar-fill{height:100%;border-radius:3px;transition:width .1s linear}
.timer-bar-green{background:linear-gradient(90deg,var(--green),#86EFAC)}
.timer-bar-yellow{background:linear-gradient(90deg,var(--gold),#FDE68A)}
.timer-bar-red{background:linear-gradient(90deg,var(--red),#FCA5A5)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px}
.badge-host{background:rgba(249,115,22,.18);color:var(--host)}
.badge-player{background:rgba(34,211,238,.18);color:var(--player)}
.badge-gold{background:rgba(252,211,77,.18);color:var(--gold)}
.badge-green{background:rgba(74,222,128,.18);color:var(--green)}
.badge-red{background:rgba(248,113,113,.18);color:var(--red)}
.badge-purple{background:rgba(192,132,252,.18);color:var(--purple)}
.badge-dim{background:rgba(255,255,255,.06);color:var(--tx3)}
/* Legacy */
.badge-p{background:rgba(192,132,252,.18);color:var(--purple)}
.badge-c{background:rgba(34,211,238,.18);color:var(--player)}
.badge-y{background:rgba(252,211,77,.18);color:var(--gold)}
.badge-r{background:rgba(248,113,113,.18);color:var(--red)}
.badge-g{background:rgba(74,222,128,.18);color:var(--green)}

/* ── VINYL ── */
.vinyl{width:64px;height:64px;border-radius:50%;background:conic-gradient(#14122A 0 33%,#1E1C38 33% 66%,#14122A 66%);border:3px solid #2A2848;position:relative;flex-shrink:0}
.vinyl::before{content:'';position:absolute;inset:50%;transform:translate(-50%,-50%);width:20px;height:20px;background:radial-gradient(circle,#3D3A60 40%,#1E1C38 40%);border-radius:50%}
.vinyl.spin{animation:spin 2s linear infinite}

/* ── CHOICE BUTTONS ── */
.choices-grid{display:grid;grid-template-columns:1fr!important;gap:10px;margin-top:14px}
.choice-btn{padding:17px 18px;background:var(--bg3);border:2px solid var(--border2);border-radius:12px;color:var(--tx);font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:all .12s;text-align:left;word-break:break-word;display:flex;align-items:center;gap:10px;user-select:none}
.choice-btn:hover:not(:disabled):not(.locked){border-color:var(--player);background:rgba(34,211,238,.075);color:var(--player);transform:translateY(-1px);box-shadow:0 4px 18px rgba(34,211,238,.18)}
.choice-btn:active:not(:disabled):not(.locked){transform:scale(.98)}
.choice-btn.correct{border-color:var(--green);background:rgba(74,222,128,.1);color:var(--green);box-shadow:var(--glow-green)}
.choice-btn.wrong{border-color:var(--red);background:rgba(248,113,113,.07);color:var(--red)}
.choice-btn.locked{cursor:default}
.choice-key{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:rgba(255,255,255,.08);border-radius:6px;font-size:.72rem;font-weight:800;flex-shrink:0;font-family:'Space Mono',monospace}

/* ── PLAYER DOT ── */
.player-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;letter-spacing:0}

/* ── PLAYER ROWS ── */
.player-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);transition:border-color .2s,background .2s;margin-bottom:6px}
.player-row:last-child{margin-bottom:0}
.player-row.waiting{}
.player-row.answered-ok{border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.05)}
.player-row.answered-wrong{border-color:rgba(248,113,113,.28);background:rgba(248,113,113,.04)}
.player-row.revealed-ok{border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.07);animation:slideUp .3s ease-out}
.player-row.revealed-wrong{border-color:rgba(248,113,113,.3)}

/* ── HOST ROOM CODE ── */
.room-code{font-family:'Barlow Condensed','Impact',sans-serif;font-weight:900;font-size:clamp(2.8rem,13vw,4.5rem);letter-spacing:clamp(6px,4vw,14px);color:var(--host);text-shadow:var(--glow-host);text-align:center;padding:16px 0 8px;cursor:pointer;transition:opacity .15s;word-break:break-all}

/* ── SCORE DISPLAY ── */
.score-num{font-family:'Space Mono','Courier New',monospace;font-weight:700}
.score-delta{font-family:'Space Mono',monospace;font-size:.7rem;font-weight:700;color:var(--green);animation:slideUp .4s ease-out}
.multi-score-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:700;background:var(--bg3);border:1px solid var(--border2)}

/* ── REACTIONS ── */
.reaction-float{position:fixed;font-size:1.8rem;pointer-events:none;z-index:300;animation:floatUp 1.4s ease-out forwards}
.reaction-bar{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.reaction-btn{font-size:1.3rem;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;width:42px;height:42px;cursor:pointer;transition:transform .1s,border-color .15s,background .15s;display:flex;align-items:center;justify-content:center}
.reaction-btn:hover{border-color:var(--player);background:rgba(34,211,238,.1)}
.reaction-btn:active{transform:scale(.75)}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--green);border-radius:10px;padding:10px 22px;color:var(--green);font-size:.78rem;font-weight:800;z-index:400;white-space:nowrap;pointer-events:none;animation:toastIn .2s ease-out;max-width:90vw;overflow:hidden;text-overflow:ellipsis}

/* ── CONNECTION DOT ── */
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--tx2);flex-shrink:0;transition:background .3s;display:inline-block}
.conn-dot.connected{background:var(--green);box-shadow:0 0 8px rgba(74,222,128,.7)}
.conn-dot.connecting{background:var(--gold);animation:pulse 1s ease-in-out infinite}
.conn-dot.failed{background:var(--red);box-shadow:0 0 8px rgba(248,113,113,.6)}

/* ── TIMER WIDGET ── */
.timer-wrap{position:relative;width:70px;height:70px;flex-shrink:0}
.timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:var(--player)}
.timer-text.urgent{color:var(--red);animation:blink .5s ease-in-out infinite}
.timer-countdown{font-family:'Space Mono',monospace;font-size:1.6rem;color:var(--player);text-shadow:var(--glow-player);min-width:44px;text-align:right;transition:color .3s}
.timer-countdown.urgent{color:var(--red);text-shadow:var(--glow-red);animation:pulse .5s ease-in-out infinite}
.prog-fill.urgent{background:linear-gradient(90deg,var(--red),#ff6b6b)}

/* ── FEEDBACK OVERLAY ── */
.feedback-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:200}
.feedback-txt{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(3rem,10vw,6rem);letter-spacing:4px;text-transform:uppercase;animation:pop .5s ease-out forwards;text-shadow:0 0 40px currentColor}

/* ── WAITING ── */
.waiting-pulse{animation:pulse 1.5s ease-in-out infinite}

/* ── REVEAL BANNER ── */
.reveal-banner{background:rgba(74,222,128,.09);border:1.5px solid var(--green);border-radius:12px;padding:14px 18px;color:var(--green);font-size:.92rem;margin-top:10px;animation:pop .3s ease-out;box-shadow:var(--glow-green)}

/* ── VOLUME ── */
.volume-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.volume-slider{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--bg3);border-radius:2px;outline:none;cursor:pointer}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--player);cursor:pointer;box-shadow:0 0 6px rgba(34,211,238,.6)}
.volume-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--player);border:none;cursor:pointer}

/* ── HOST GAME EXTRAS ── */
.round-track{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-bottom:10px}
.round-pip{width:7px;height:7px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);flex-shrink:0;transition:background .3s}
.round-pip.done{background:var(--tx2)}
.round-pip.current{background:var(--player);box-shadow:0 0 7px rgba(34,211,238,.65)}
.host-reveal-btn{animation:pulse-border 1.5s ease-in-out infinite}

/* ── PLAYER GAME EXTRAS ── */
.my-score-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:8px 14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border2)}
.combo-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;background:rgba(252,211,77,.18);color:var(--gold);border:1px solid rgba(252,211,77,.25);animation:pulse 1s ease-in-out infinite}

/* ── DIVIDER ── */
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}

<script>
const BT_DIFF = {
  facile:    { dur:30, replays:3, pts:100, speedPts:50,  label:'Facile',        icon:'🟢', hint:'30s • 3 réécoutes' },
  inter:     { dur:20, replays:2, pts:200, speedPts:100, label:'Intermédiaire', icon:'🟡', hint:'20s • 2 réécoutes' },
  difficile: { dur:10, replays:1, pts:300, speedPts:150, label:'Difficile',     icon:'🟠', hint:'10s • 1 réécoute' },
  hard:      { dur:5,  replays:0, pts:500, speedPts:250, label:'HARD',          icon:'🔴', hint:'5s • 0 réécoute' },
};

// ── CALCUL DES POINTS ──────────────────────────────────────────
// Bonus vitesse : linéaire (pas de paliers — plus c'est rapide, plus c'est récompensé)
// Bonus combo : 3+ = +15%, 5+ = +30%, 8+ = +50% de la base
function calcPoints(diffKey, elapsed, totalDur, streakAfter, hintShown, isQCM = false) {
  const d = BT_DIFF[diffKey];
  const base = d.pts;

  // Bonus vitesse — parfaitement linéaire, de 0 (réponse au dernier moment) à speedPts (instantané)
  let speed = 0;
  if (totalDur > 0 && totalDur < 9000 && elapsed >= 0) {
    const ratio = Math.max(0, 1 - elapsed / totalDur);
    speed = Math.round(d.speedPts * ratio);
  }

  // Bonus combo — simple : 3 / 5 / 8 bonnes d'affilée
  let streak = 0;
  if      (streakAfter >= 8) streak = Math.round(base * 0.5);
  else if (streakAfter >= 5) streak = Math.round(base * 0.3);
  else if (streakAfter >= 3) streak = Math.round(base * 0.15);

  const total = Math.max(1, base + speed + streak);
  return { total, base, speed, streak, hint: 0 };
}

// ── BONUS DE FIN DE PARTIE ────────────────────────────────────
// 5 catégories qui peuvent renverser le classement jusqu'à la dernière note
function calcFinalBonuses(state) {
  const players = Object.keys(state.scores);
  if (players.length === 0) return { bonuses: [], byPlayer: {} };
  const nRounds = state.queue ? state.queue.length : 1;
  const base = BT_DIFF[state.diff]?.pts || 100;
  const bonuses = []; // { player, emoji, label, sub, pts }
  const byPlayer = {};
  players.forEach(p => byPlayer[p] = 0);

  // ⚡ RÉFLEXE — temps de réponse moyen le plus bas (sur les bonnes réponses seulement)
  const correctTimes = state.correctResponseTimes || {};
  const avgTimes = {};
  players.forEach(p => {
    const times = correctTimes[p] || [];
    if (times.length > 0) avgTimes[p] = times.reduce((a,b) => a+b, 0) / times.length;
  });
  const timeCandidates = players.filter(p => avgTimes[p] !== undefined);
  if (timeCandidates.length > 0) {
    timeCandidates.sort((a,b) => avgTimes[a] - avgTimes[b]);
    const fastest = timeCandidates[0];
    const pts = Math.round(base * Math.max(nRounds * 0.25, 3));
    bonuses.push({ player: fastest, emoji: '⚡', label: 'RÉFLEXE', sub: `Temps moyen : ${(avgTimes[fastest]/1000).toFixed(2)}s`, pts });
    byPlayer[fastest] += pts;
  }

  // 🔥 COMBO — plus longue série de bonnes réponses (≥ 3)
  const maxStreaks = state.maxStreaks || {};
  const comboLeader = players.reduce((best, p) => (maxStreaks[p]||0) > (maxStreaks[best]||0) ? p : best, players[0]);
  const comboVal = maxStreaks[comboLeader] || 0;
  if (comboVal >= 3) {
    const pts = Math.round(base * comboVal * 0.4);
    bonuses.push({ player: comboLeader, emoji: '🔥', label: 'COMBO', sub: `Série de ${comboVal} bonnes réponses de suite`, pts });
    byPlayer[comboLeader] += pts;
  }

  // 🎯 LAST CALL — bonne réponse sur la dernière musique (bonus plus grand si seul)
  const lastCorrect = players.filter(p => state.lastRoundCorrect?.[p]);
  if (lastCorrect.length > 0 && lastCorrect.length < players.length) {
    const pts = Math.round(base * (lastCorrect.length === 1 ? 2.5 : 1.5));
    lastCorrect.forEach(p => {
      bonuses.push({ player: p, emoji: '🎯', label: 'LAST CALL', sub: lastCorrect.length === 1 ? 'Seul à répondre juste sur la dernière !' : 'Bonne réponse sur la dernière musique', pts });
      byPlayer[p] += pts;
    });
  }

  // 💯 PARFAIT — toutes les réponses correctes
  const correctCount = state.correctCount || {};
  players.forEach(p => {
    if ((correctCount[p] || 0) >= nRounds && nRounds > 0) {
      const pts = Math.round(base * nRounds * 0.4);
      bonuses.push({ player: p, emoji: '💯', label: 'PARFAIT', sub: `${nRounds}/${nRounds} — sans une seule erreur !`, pts });
      byPlayer[p] += pts;
    }
  });

  // 📈 REMONTADA — était dans la moitié basse à mi-parcours, finit dans la moitié haute
  if (state.halfTimeScores && players.length >= 2) {
    const halfRanked = [...players].sort((a,b) => (state.halfTimeScores[b]||0) - (state.halfTimeScores[a]||0));
    const finalRanked = [...players].sort((a,b) => (state.scores[b]||0) - (state.scores[a]||0));
    const midPt = Math.ceil(players.length / 2);
    players.forEach(p => {
      const halfPos = halfRanked.indexOf(p);
      const finalPos = finalRanked.indexOf(p);
      if (halfPos >= midPt && finalPos < midPt) {
        const pts = Math.round(base * nRounds * 0.2);
        bonuses.push({ player: p, emoji: '📈', label: 'REMONTADA', sub: `De la ${halfPos+1}e place à la ${finalPos+1}e !`, pts });
        byPlayer[p] += pts;
      }
    });
  }

  return { bonuses, byPlayer };
}

let _idbInstance = null;
function openIDB() {
  if (_idbInstance) return Promise.resolve(_idbInstance);
  return new Promise((res, rej) => {
    const req = indexedDB.open('blindtest_v1', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('kv');
    req.onsuccess = e => { _idbInstance = e.target.result; res(_idbInstance); };
    req.onerror = () => rej(req.error);
  });
}
async function idbSet(key, val) {
  try {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('kv', 'readwrite');
      tx.objectStore('kv').put(val, key);
      tx.oncomplete = res;
      tx.onerror = () => rej(tx.error);
    });
  } catch(e) { console.warn('IDB set error:', e); }
}
async function idbGet(key) {
  try {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('kv', 'readonly');
      const req = tx.objectStore('kv').get(key);
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  } catch(e) { return null; }
}

const ARCHIVE_ID = 'blind-test-huhu'; // ← changer ici si tu changes d'item Archive.org

async function saveServerDataToIDB() {
  try {
    const serverSongs = S.songs.filter(s => !s.file).map(s => ({ name: s.name, url: s.url, artist: s.artist, title: s.title }));
    await idbSet('server_songs', JSON.stringify(serverSongs));
  } catch(e) { console.warn('IDB save error:', e); }
}

async function restoreServerDataFromIDB() {
  try {
    const songs = await idbGet('server_songs');
    if (songs) {
      const arr = JSON.parse(songs);
      if (arr.length) {
        const existingUrls = new Set(S.songs.map(s => s.url));
        arr.forEach(s => { if (!existingUrls.has(s.url)) S.songs.push({ file: null, ...s }); });
      }
    }
  } catch(e) {}
}

async function tryRestoreHandles() {
  await restoreServerDataFromIDB();

  if (!FS_SUPPORTED) return;
  try {
    const mh = await idbGet('musicDir');
    if (mh) {
      _musicDirHandle = mh;
      const perm = await mh.queryPermission({ mode: 'read' });
      if (perm === 'granted') await loadFilesFromDir(mh, 'audio');
    }
  } catch(e) {}
}

// ── CHARGEMENT ARCHIVE.ORG ────────────────────────────────────
async function loadFromArchive(retryCount = 0) {
  showLoadingOverlay('⬇️ Chargement depuis Archive.org…');
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 20000);
    const res = await fetch(`https://archive.org/metadata/${ARCHIVE_ID}/files`, { signal: controller.signal });
    clearTimeout(timeout);
    if (!res.ok) throw new Error('Réponse HTTP ' + res.status);
    const data = await res.json();
    const mp3s = (data.result || []).filter(f => /\.mp3$/i.test(f.name));
    if (!mp3s.length) throw new Error('Aucun MP3 trouvé dans l\'item Archive.org');
    S.songs = S.songs.filter(s => s.file !== null);
    mp3s.forEach(f => {
      const { artist, title } = parseName(f.name);
      S.songs.push({
        file: null,
        name: f.name,
        url: `https://archive.org/download/${ARCHIVE_ID}/${encodeURIComponent(f.name)}`,
        artist, title
      });
    });
    await saveServerDataToIDB();
    S.musicCardOpen = false;
    hideLoadingOverlay();
    render();
    showToast(`✅ ${mp3s.length} musiques chargées !`, 3000);
  } catch(e) {
    hideLoadingOverlay();
    if (retryCount < 2) {
      showToast(`⚠️ Erreur réseau — nouvelle tentative (${retryCount + 1}/2)…`, 3500);
      setTimeout(() => loadFromArchive(retryCount + 1), 3500);
    } else {
      showToast('❌ Archive.org inaccessible. Vérifie ta connexion.', 5000);
      render();
    }
  }
}
window.loadFromArchive = loadFromArchive;

// ── CLASSEMENT EN LIGNE ────────────────────────────────────────
function getOnlineLBUrl() {
  try { return localStorage.getItem('bt_online_lb_url') || 'https://blind-test-huhu-default-rtdb.firebaseio.com'; } catch(e) { return ''; }
}
function setOnlineLBUrl(url) {
  try { localStorage.setItem('bt_online_lb_url', (url || '').trim().replace(/\/+$/, '')); } catch(e) {}
}

async function pushScoreOnline(entry) {
  const url = getOnlineLBUrl();
  if (!url) return;
  try {
    await fetch(url + '/scores.json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: entry.name, score: entry.score, total: entry.total, mode: entry.mode, diff: entry.diff, date: entry.date, userId: entry.userId || '', ts: Date.now() })
    });
  } catch(e) { console.warn('Classement en ligne :', e); }
}

async function fetchOnlineLB() {
  const url = getOnlineLBUrl();
  if (!url) return null;
  try {
    const res = await fetch(url + '/scores.json', { cache: 'no-store' });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data) return [];
    return Object.values(data)
      .filter(e => e && e.name && e.total > 0)
      .sort((a, b) => b.score !== a.score ? b.score - a.score : (b.score/b.total) - (a.score/a.total))
      .slice(0, 100);
  } catch(e) { return null; }
}

        <span style="font-size:.75rem;display:inline-block;transition:transform .15s;${nqOpen?'transform:rotate(90deg)':''}">▶</span>
        <span class="display" style="font-size:1rem;letter-spacing:2px;color:var(--player);flex:1">${nq} QUESTIONS</span>
        <span style="font-size:.7rem;color:var(--tx2)">${nqCount} scores</span>
      </button>`;
    if (nqOpen) {
      acc += `<div style="padding:8px 8px 4px">`;
      for (const diff of DIFF_ORDER) {
        if (!groups[nq][diff]) continue;
        const entries = groups[nq][diff];
        const diffKey = nqKey + '_' + diff;
        const diffOpen = !!_lbAccState[diffKey];
        const d = BT_DIFF[diff] || {};
        acc += `<div style="margin-bottom:6px;border:1px solid rgba(255,255,255,.06);border-radius:8px;overflow:hidden">
          <button onclick="lbToggle('${diffKey}')" style="width:100%;display:flex;align-items:center;gap:10px;padding:10px 13px;background:rgba(255,255,255,.02);border:none;cursor:pointer;color:var(--tx);font-family:'Nunito',sans-serif;text-align:left">
            <span style="font-size:.7rem;display:inline-block;transition:transform .15s;${diffOpen?'transform:rotate(90deg)':''}">▶</span>
            <span style="font-size:.82rem;flex:1;font-weight:700">${d.icon||''} ${escHtml(d.label||diff)}</span>
            <span style="font-size:.68rem;color:var(--tx2)">${entries.length} scores</span>
            <span style="margin-left:12px;font-family:'Space Mono',monospace;font-size:.9rem;color:var(--gold)">${entries[0]?.score?.toLocaleString()||''}</span>
          </button>`;
        if (diffOpen) {
          acc += `<div style="padding:4px 13px 10px">`;
          for (let i = 0; i < entries.length; i++) {
            const e = entries[i];
            const pct = e.total > 0 ? Math.round((e.score/e.total)*100) : 0;
            const medal = i < 3 ? MEDAL[i] : `<span style="font-family:'Space Mono',monospace;font-size:.8rem;color:var(--tx2)">#${i+1}</span>`;
            acc += `<div class="flex items-center gap-2" style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
              <span style="min-width:26px;font-size:.95rem;text-align:center">${medal}</span>
              <span class="bold flex-1 truncate" style="font-size:.88rem">${escHtml(e.name)}</span>
              <span style="font-family:'Space Mono',monospace;font-size:1rem;color:var(--gold)">${e.score.toLocaleString()}</span>
              <span class="text-xs text-dim" style="min-width:32px;text-align:right">${pct}%</span>
            </div>`;
          }
          acc += `</div>`;
        }
        acc += `</div>`;
      }
      acc += `</div>`;
    }
    acc += `</div>`;
  }
  return `<div class="screen">${header}<div class="card mb-3">${topBar}${cfgPanel}</div>${acc}</div>`;
}
window.loadOnlineLBAndRender = loadOnlineLBAndRender;

// ═══════════════════════════════════════════════════════════════
// RENDER : Game Hôte
// ═══════════════════════════════════════════════════════════════
function _renderMultiHostGame() {
  const song  = _multi.queue[_multi.round];
  const diff  = BT_DIFF[_multi.diff];
  const phase = _multi.phase;
  const dur   = _multi.roundDur || diff.dur;
  const nTotal = _multi.queue.length;
  const answeredCount = _multi.players.filter(p => p.answered).length;
  const totalPlayers  = _multi.players.length;

  const remInit = phase === 'playing'
    ? Math.max(0, dur - (Date.now() - _multi.roundStartTime) / 1000) : 0;
  const remPct  = dur > 0 ? (remInit / dur * 100) : 0;

  // Round progress pips (max 20 shown)
  const maxPips = Math.min(nTotal, 20);
  const pipsHtml = nTotal <= 20
    ? `<div class="round-track">
        ${Array.from({length:nTotal}, (_,i) =>
          `<span class="round-pip${i<_multi.round?' done':i===_multi.round?' current':''}"></span>`
        ).join('')}
      </div>`
    : `<div class="prog-bar mb-2" style="height:4px">
        <div class="prog-fill" style="width:${(_multi.round/nTotal)*100}%"></div>
      </div>`;

  // Players rows
  const playersHtml = _multi.players.map((p,i) => {
    const col = PARTY_COLORS[i%PARTY_COLORS.length];
    const hasAnswer = p.answered;
    const isCorrect = hasAnswer && p.correct;
    const isWrong = hasAnswer && p.correct === false;
    const ans = _multi.answers[p.name];
    const ansText = phase === 'answered' && ans ? `<span class="text-xs" style="color:var(--tx2);margin-left:4px">"${escHtml(ans)}"</span>` : '';
    const rtArr = _multi.responseTimes?.[p.name];
    const lastRt = rtArr && rtArr.length > 0 ? rtArr[rtArr.length-1] : null;
    const rtLabel = lastRt != null && (phase === 'answered' || p.answered)
      ? `<span style="font-size:.62rem;color:var(--green);margin-left:4px">⚡${(lastRt/1000).toFixed(1)}s</span>` : '';
    const delta = phase === 'answered' && isCorrect && _multi.roundPts?.[p.name]
      ? `<span class="score-delta" style="margin-left:4px">+${_multi.roundPts[p.name].total}</span>` : '';
    const statusIcon = hasAnswer
      ? (isCorrect ? '✅' : '❌')
      : (phase === 'playing' ? '⌛' : '—');
    const rowClass = phase === 'answered'
      ? (isCorrect ? 'revealed-ok' : 'revealed-wrong')
      : (hasAnswer ? (isCorrect ? 'answered-ok' : 'answered-wrong') : '');

    return `<div class="player-row ${rowClass}">
      <span class="player-dot" style="background:${col};color:#000;font-size:.75rem">${escHtml(p.name[0].toUpperCase())}</span>
      <div style="flex:1;min-width:0">
        <div class="flex items-center flex-wrap gap-1">
          <span style="font-weight:800;font-size:.88rem">${escHtml(p.name)}</span>

        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <span style="font-family:'Space Mono',monospace;font-size:.9rem;color:${col}">${(_multi.scores[p.name]||0).toLocaleString()}</span>

      <span style="font-size:1rem;margin-left:4px;flex-shrink:0">${statusIcon}</span>
    </div>`;
  }).join('');

  // ── Zone hôte selon phase ──
  let gameZoneHtml = '';

  if (phase === 'playing') {
    const timerColor = remInit > dur*0.5 ? 'var(--green)' : remInit > dur*0.25 ? 'var(--gold)' : 'var(--red)';
    const timerBarClass = remInit > dur*0.5 ? 'timer-bar-green' : remInit > dur*0.25 ? 'timer-bar-yellow' : 'timer-bar-red';
    gameZoneHtml = `
      <div class="timer-bar-wrap">
        <div id="host-timer-bar" class="timer-bar-fill ${timerBarClass}" style="width:${remPct}%"></div>
      </div>
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-3">
          <div class="vinyl spin"></div>
          <div>
            <p style="font-weight:800;font-size:.88rem">🎵 En écoute…</p>
            <p class="text-xs text-dim">
              <span id="host-timer-txt">${Math.ceil(remInit)}s</span> restantes
            </p>
          </div>
        </div>
        <span class="badge ${answeredCount===totalPlayers?'badge-green':'badge-dim'}">${answeredCount}/${totalPlayers} ont répondu</span>
      </div>
      ${_multi.myAnswer !== null
        ? `<div style="text-align:center;padding:10px 0;background:rgba(74,222,128,.07);border-radius:10px;border:1px solid rgba(74,222,128,.25);margin-bottom:10px">
            <p style="font-size:1.4rem;margin-bottom:3px">✅</p>
            <p class="text-xs" style="font-weight:800;color:var(--green)">Ta réponse : "${escHtml(_multi.myAnswer)}"</p>
          </div>`
        : `<div class="choices-grid" style="margin-bottom:10px">
            ${(_multi.currentChoices||[]).map((c,ci) => `
              <button class="choice-btn" data-choice="${escHtml(c)}" onclick="multiHostAnswer(this.dataset.choice)">
                <span class="choice-key">${['A','B','C','D'][ci]||ci+1}</span>
                ${escHtml(c)}
              </button>`).join('')}
          </div>`}
      <button class="btn btn-red btn-full host-reveal-btn" onclick="multiHostReveal()">
        🔍 Révéler maintenant
      </button>`;

  } else if (phase === 'answered') {
    const ok2 = _multiCheckAnswer(_multi.myAnswer, song);
    const hPts = (_multi.roundPts||{})[_multi.hostName];
    const hStreak = (_multi.streaks||{})[_multi.hostName] || 0;
    gameZoneHtml = `
      <div class="reveal-banner mb-3">
        <p class="text-xs" style="color:var(--green);letter-spacing:2px;margin-bottom:4px;opacity:.7">RÉPONSE CORRECTE</p>
        <p style="font-weight:800;font-size:1rem">🎵 ${escHtml(song?.artist||'')} — <span style="color:var(--tx)">${escHtml(song?.title||'')}</span></p>
      </div>
      ${_multi.myAnswer !== null
        ? `<p class="text-xs text-center mb-2" style="color:${ok2?'var(--green)':'var(--red)'}">
            ${ok2
              ? '🥳 Bonne réponse ! ' + (hStreak>=3?'🔥x'+hStreak+' · ':'') + '+' + (hPts?hPts.total:BT_DIFF[_multi.diff].pts) + ' pts'
              : '😅 ' + escHtml(_multi.myAnswer||'')}
           </p>
           ${ok2 && hPts && (hPts.speed>0||hPts.streak>0) ? `<div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:10px">
            ${hPts.speed>0?`<span class="badge badge-player" style="font-size:.6rem">🚀 Vitesse +${hPts.speed}</span>`:''}
            ${hPts.streak>0?`<span class="badge badge-gold" style="font-size:.6rem">🔥 Combo +${hPts.streak}</span>`:''}
           </div>`:''}`
        : `<p class="text-xs text-dim text-center mb-2">Tu n'as pas répondu</p>`}
      <button class="btn btn-host btn-lg btn-full" onclick="multiHostNext()">
        ${_multi.round+1>=_multi.queue.length ? '🏆 Voir les résultats' : '⏭ Chanson suivante'}
      </button>`;
  }

  return `<div class="screen">
    <!-- Header -->
    <div class="flex items-center justify-between mb-3">
      <span class="badge badge-host">🎮 HÔTE</span>
      <span class="display" style="font-size:.9rem;color:var(--tx3)">
        ${_multi.round+1} / ${nTotal}
      </span>
      <span class="badge badge-dim">${diff.icon} ${diff.label}</span>
    </div>

    ${pipsHtml}

    <!-- Zone principale -->
    <div class="card card-host mb-3">
      ${gameZoneHtml || ''}
    </div>

    <!-- Joueurs en temps réel -->
    <div class="card mb-3">
      <div class="flex items-center justify-between mb-3">
        <h3 style="margin-bottom:0">👥 En direct</h3>
        <span class="badge ${answeredCount===totalPlayers&&totalPlayers>0?'badge-green':'badge-dim'}">${answeredCount}/${totalPlayers}</span>
      </div>
      ${playersHtml || '<p class="text-xs text-dim">Aucun joueur</p>'}
    </div>

    ${phase==='answered' ? `
    <div class="card" style="padding:14px 18px">
      <h3 style="margin-bottom:10px">😂 Réactions</h3>
      <div class="reaction-bar" style="justify-content:flex-start">
        ${REACTION_EMOJIS.map(e=>`<button class="reaction-btn" onclick="sendReaction('${e}')">${e}</button>`).join('')}
      </div>
    </div>` : ''}
  </div>`;
}

function _renderMultiPlayerGame() {
  const phase    = _multi.phase;
  const q        = _multi.currentQuestion;
  const rev      = _multi.reveal;
  const myAns    = _multi.myAnswer;
  const myScore  = _multi.scores[_multi.playerName] || 0;
  const diff     = BT_DIFF[_multi.diff || 'facile'];
  const dur      = _multi.roundDur || diff.dur;
  const myStreak = (_multi.streaks || {})[_multi.playerName] || 0;
  const totalRounds = _multi.totalRounds || 0;
  const currentRound = _multi.round + 1;

  // Rank
  const sortedScores = Object.entries(_multi.scores||{}).sort((a,b)=>b[1]-a[1]);
  const myRank = sortedScores.findIndex(([n])=>n===_multi.playerName) + 1;

  // Top scores strip
  const topStrip = sortedScores.slice(0,5).map(([n,s],i) => {
    const col = PARTY_COLORS[i%PARTY_COLORS.length];
    const isMe = n === _multi.playerName;
    return `<span class="score-chip" style="${isMe?'border-color:'+col+';color:'+col:''}">
      ${isMe?'<span style="font-size:.7rem">👤</span>':''}
      <span style="font-size:.72rem;font-weight:800">${escHtml(n)}</span>
      <span style="font-family:\'Space Mono\',monospace;font-size:.7rem">${s.toLocaleString()}</span>
    </span>`;
  }).join('');

  const headerHtml = `
    <div class="my-score-bar">
      <div>
        <p class="text-xs" style="color:var(--tx2);letter-spacing:1px">TON SCORE</p>
        <p style="font-family:'Space Mono',monospace;font-weight:700;font-size:1.1rem;color:var(--player)">${myScore.toLocaleString()}</p>
      </div>
      <div style="text-align:right">
        <p class="text-xs" style="color:var(--tx2);letter-spacing:1px">MANCHE</p>
        <p style="font-weight:800;font-size:1rem">${currentRound}${totalRounds?'/'+totalRounds:''}</p>
      </div>
    </div>
    ${myStreak >= 3 ? `<div style="text-align:center;margin-bottom:10px">
      <span class="combo-badge">${myStreak>=8?'🔥🔥🔥':myStreak>=5?'🔥🔥':'🔥'} COMBO x${myStreak}</span>
    </div>` : ''}`;

  let mainHtml = '';

  if (phase === 'lobby') {
    mainHtml = `${headerHtml}<div style="text-align:center;padding:50px 0">
      <p style="font-size:3rem;margin-bottom:12px" class="waiting-pulse">⏳</p>
      <p style="font-weight:800;font-size:1rem">En attente de l'hôte…</p>
    </div>`;
  }

  else if (phase === 'playing') {
    const elapsedNow = _multi.roundStartTime > 0 ? (Date.now() - _multi.roundStartTime)/1000 : 0;
    const remNow = Math.max(0, dur - elapsedNow);
    const pctNow = dur > 0 ? Math.min(100, (elapsedNow/dur)*100) : 0;
    const timerBarClass = elapsedNow < dur*0.5 ? 'timer-bar-green' : elapsedNow < dur*0.75 ? 'timer-bar-yellow' : 'timer-bar-red';

    if (myAns !== null) {
      mainHtml = `${headerHtml}
        <div style="text-align:center;padding:40px 0">
          <p style="font-size:3rem;margin-bottom:12px">✅</p>
          <p style="font-weight:800;font-size:1rem;margin-bottom:6px">Réponse envoyée !</p>
          <p class="text-xs text-dim mb-3">En attente des autres joueurs…</p>
          <p style="font-size:.9rem;color:var(--player);font-weight:700">"${escHtml(myAns)}"</p>
        </div>`;
    } else if (q && q.choices && q.choices.length) {
      const label = (q.field||'artist')==='artist' ? "L'ARTISTE" : 'LE TITRE';
      mainHtml = `${headerHtml}
        <div class="timer-bar-wrap">
          <div id="player-timer-bar" class="timer-bar-fill ${timerBarClass}" style="width:${100-pctNow}%"></div>
        </div>
        <div class="flex items-center justify-between mb-4">
          <div>
            <p class="text-xs" style="color:var(--tx2);letter-spacing:2px">DEVINER ${label}</p>
          </div>
          <div id="player-timer-txt" class="timer-countdown${remNow<=5?' urgent':''}">${Math.ceil(remNow)}s</div>
        </div>
        <div class="choices-grid">
          ${q.choices.map((c,ci) => `
            <button class="choice-btn" data-choice="${escHtml(c)}" onclick="multiPlayerAnswer(this.dataset.choice)">
              <span class="choice-key">${['A','B','C','D'][ci]||ci+1}</span>
              ${escHtml(c)}
            </button>`).join('')}
        </div>`;
    } else {
      mainHtml = `${headerHtml}<div style="text-align:center;padding:50px 0">
        <p style="font-size:3rem;margin-bottom:12px">🎵</p>
        <p style="font-weight:800">Écoute bien…</p>
        <p class="text-xs text-dim mt-2">Les choix arrivent</p>
      </div>`;
    }
  }

  else if (phase === 'answered') {
    const correct = rev?.correct || '';
    const ok = myAns !== null && norm(myAns) === norm(correct);
    const myPts = (_multi.roundPts || {})[_multi.playerName];
    const streakLabel = myStreak>=10?'🔥🔥🔥 x'+myStreak:myStreak>=5?'🔥🔥 x'+myStreak:myStreak>=3?'🔥 x'+myStreak:null;

    const rtEntries = Object.entries(_multi.responseTimes||{})
      .map(([n,arr]) => ({name:n, ms:arr.length?arr[arr.length-1]:null}))
      .filter(e=>e.ms!=null).sort((a,b)=>a.ms-b.ms);

    const rtHtml = rtEntries.length > 1
      ? `<div style="margin-top:12px">
          <p class="text-xs text-dim mb-2" style="letter-spacing:1px">⚡ TEMPS DE RÉPONSE</p>
          ${rtEntries.map((e,i) => `
            <div class="flex items-center gap-2" style="padding:4px 0">
              <span style="font-size:.65rem;color:${PARTY_COLORS[i%PARTY_COLORS.length]};font-weight:800;min-width:22px">${i+1}.</span>
              <span class="text-xs flex-1">${escHtml(e.name)}</span>
              <span style="font-family:'Space Mono',monospace;font-size:.68rem;font-weight:700;color:${i===0?'var(--green)':'var(--tx2)'}">${(e.ms/1000).toFixed(2)}s</span>
            </div>`).join('')}
        </div>` : '';

    mainHtml = `${headerHtml}
      <div style="text-align:center;padding:16px 0 20px">
        <p style="font-size:3.5rem;margin-bottom:10px">${ok?'🥳':myAns?'😅':'😶'}</p>
        <p style="font-weight:800;font-size:1.1rem;margin-bottom:6px;color:${ok?'var(--green)':myAns?'var(--red)':'var(--tx2)'}">
          ${ok
            ? (streakLabel?streakLabel+' · ':'') + '+'+(myPts?myPts.total:diff.pts)+' pts !'
            : myAns ? 'Pas tout à fait…' : 'Pas de réponse'}
        </p>
        ${ok && myPts && (myPts.speed>0||myPts.streak>0) ? `
          <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:12px">
            <span class="badge badge-purple">⚡ Base +${myPts.base}</span>
            ${myPts.speed>0?`<span class="badge badge-player">🚀 Vitesse +${myPts.speed}</span>`:''}
            ${myPts.streak>0?`<span class="badge badge-gold">🔥 Combo +${myPts.streak}</span>`:''}
          </div>` : ''}
        <div class="reveal-banner mb-3" style="text-align:left">
          <p class="text-xs" style="color:var(--green);letter-spacing:2px;margin-bottom:3px;opacity:.7">RÉPONSE</p>
          <p style="font-weight:800">🎵 ${escHtml(rev?.artist||'')} — <span style="color:var(--tx)">${escHtml(rev?.title||'')}</span></p>
        </div>
        ${myAns && !ok ? `<p class="text-xs text-dim mb-2">Ta réponse : "${escHtml(myAns)}"</p>` : ''}
      </div>
      ${rtHtml}
      <div class="reaction-bar mt-2">
        ${REACTION_EMOJIS.map(e=>`<button class="reaction-btn" onclick="sendReaction('${e}')">${e}</button>`).join('')}
      </div>
      ${myRank > 0 ? `<div style="text-align:center;margin-top:14px">
        <p class="text-xs text-dim" style="letter-spacing:1px">TON CLASSEMENT</p>
        <p style="font-family:'Space Mono',monospace;font-weight:700;font-size:1.4rem;color:var(--gold)">#${myRank}</p>
      </div>` : ''}`;
  }

  return `<div class="screen">${mainHtml}</div>`;
}

function renderMultiResults() {
  if (!_multi) return renderMultiSetup();
  const scores   = _multi.scores || {};
  const nRounds  = _multi.queue ? _multi.queue.length : 0;
  const diff     = BT_DIFF[_multi.diff || 'facile'];
  const correctCount = _multi.correctCount || {};
  const maxStreaks   = _multi.maxStreaks || {};

  const ranked = Object.entries(scores).sort((a,b) => b[1]-a[1]);

  // Bonus de fin
  const finalBonuses = _multi.finalBonuses || [];
  const BONUS_STYLES = {
    'RÉFLEXE':  { color:'var(--player)', bg:'rgba(34,211,238,.1)',   border:'rgba(34,211,238,.3)' },
    'COMBO':    { color:'var(--gold)',   bg:'rgba(252,211,77,.1)',   border:'rgba(252,211,77,.3)' },
    'LAST CALL':{ color:'var(--purple)', bg:'rgba(192,132,252,.1)',  border:'rgba(192,132,252,.3)' },
    'PARFAIT':  { color:'var(--green)',  bg:'rgba(74,222,128,.1)',   border:'rgba(74,222,128,.3)' },
    'REMONTADA':{ color:'var(--host)',   bg:'rgba(249,115,22,.1)',   border:'rgba(249,115,22,.3)' },
  };

  const bonusByPlayer = {};
  finalBonuses.forEach(b => {
    if (!bonusByPlayer[b.player]) bonusByPlayer[b.player] = [];
    bonusByPlayer[b.player].push(b);
  });

  // Tie check
  const hasTie = ranked.length > 1 && ranked[0][1] === ranked[1][1];

  const bonusSectionHtml = finalBonuses.length > 0 ? `
    <div class="card mb-3">
      <div style="text-align:center;margin-bottom:14px">
        <p style="font-size:1.6rem;margin-bottom:4px">🎁</p>
        <p class="display" style="font-size:1rem;letter-spacing:3px;color:var(--gold)">BONUS DE FIN DE PARTIE</p>
      </div>
      ${finalBonuses.map(b => {
        const style = BONUS_STYLES[b.label] || {color:'var(--purple)',bg:'rgba(192,132,252,.1)',border:'rgba(192,132,252,.3)'};
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:6px;background:${style.bg};border:1px solid ${style.border};border-radius:10px">
          <span style="font-size:1.4rem;flex-shrink:0">${b.emoji}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span class="display" style="font-size:.72rem;letter-spacing:2px;color:${style.color}">${b.label}</span>
              <span style="font-size:.82rem;font-weight:800;color:var(--tx)">${escHtml(b.player)}</span>
            </div>
            <p style="font-size:.63rem;color:var(--tx2);margin-top:1px">${escHtml(b.sub)}</p>
          </div>
          <span class="display" style="font-size:1.1rem;color:${style.color};flex-shrink:0">+${b.pts.toLocaleString()}</span>
        </div>`;
      }).join('')}
    </div>` : '';

  const winnerHtml = ranked[0] ? `
    <div class="card card-gold mb-3 text-center" style="padding:24px 20px">
      <p class="text-xs" style="color:var(--tx2);letter-spacing:3px;margin-bottom:10px">🏆 GAGNANT</p>
      <div class="player-dot" style="background:var(--gold);color:#000;width:52px;height:52px;font-size:1.2rem;margin:0 auto 10px;font-family:'Barlow Condensed',sans-serif;font-weight:900">
        ${escHtml(ranked[0][0][0].toUpperCase())}
      </div>
      <p class="display" style="font-size:1.6rem;color:var(--gold);margin-bottom:4px">${escHtml(ranked[0][0])}</p>
      <p class="neon-gold" style="font-family:'Space Mono',monospace;font-weight:700;font-size:2.6rem;line-height:1.1">${ranked[0][1].toLocaleString()}</p>
      <p style="font-size:.65rem;color:var(--tx2);margin-top:4px">points</p>
      ${(bonusByPlayer[ranked[0][0]]||[]).length > 0
        ? `<div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:10px">
            ${(bonusByPlayer[ranked[0][0]]||[]).map(b=>`<span style="background:rgba(252,211,77,.2);color:var(--gold);border-radius:20px;padding:2px 10px;font-size:.63rem;font-weight:800">${b.emoji} ${b.label}</span>`).join('')}
          </div>` : ''}
      ${hasTie ? `<p class="text-xs text-dim mt-2">⏱ ex-æquo départagé par le temps</p>` : ''}
    </div>` : '';

  const rankingHtml = `
    <div class="card mb-4">
      <h3 style="margin-bottom:12px">📊 Classement final</h3>
      ${ranked.map(([name, score], i) => {
        const col = PARTY_COLORS[i % PARTY_COLORS.length];
        const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span class="display" style="color:var(--tx2);font-size:.9rem">#${i+1}</span>`;
        const correct = correctCount[name] ?? '?';
        const maxStreak = maxStreaks[name] || 0;
        const playerBonuses = bonusByPlayer[name] || [];
        return `<div style="padding:12px 0;border-bottom:1px solid var(--border)">
          <div class="flex items-center gap-3">
            <span style="font-size:1.2rem;min-width:28px;text-align:center">${medal}</span>
            <span class="player-dot" style="background:${col};color:#000;font-size:.75rem">${escHtml(name[0].toUpperCase())}</span>
            <span style="font-weight:800;flex:1">${escHtml(name)}</span>
            <div style="text-align:right">
              <span style="font-family:'Space Mono',monospace;font-size:1.3rem;color:${col}">${score.toLocaleString()}</span>
              <span class="text-xs text-dim"> pts</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:5px;padding-left:60px;flex-wrap:wrap">
            <span style="font-size:.62rem;color:var(--tx2)">✅ ${correct}/${nRounds}</span>
            ${maxStreak >= 3 ? `<span style="font-size:.62rem;color:var(--gold)">🔥 x${maxStreak}</span>` : ''}
            ${playerBonuses.map(b=>{
              const st = BONUS_STYLES[b.label]||{bg:'rgba(192,132,252,.1)',color:'var(--purple)'};
              return `<span style="background:${st.bg};color:${st.color};border-radius:10px;padding:1px 7px;font-size:.6rem;font-weight:800">${b.emoji} +${b.pts}</span>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;

  return `<div class="screen" style="text-align:center">
    <div style="padding:16px 0 14px">
      <p style="font-size:2.2rem;margin-bottom:6px">🏆</p>
      <h2 class="neon-gold">Résultats</h2>
      <p class="text-xs text-dim mt-1">${nRounds} manches · ${diff.icon} ${diff.label}</p>
    </div>
    ${winnerHtml}
    ${bonusSectionHtml}
    <div style="text-align:left">${rankingHtml}</div>
    <button class="btn btn-player btn-lg btn-full mb-3" onclick="shareScore()">📤 Partager les résultats</button>
    <button class="btn btn-host btn-lg btn-full mb-3" onclick="ablyDisconnect();goto('multi-setup')">🔄 Nouvelle partie</button>
    <button class="btn btn-ghost btn-full" onclick="ablyDisconnect();goto('home')">🏠 Retour à l'accueil</button>
  </div>`;
}


function setVolume(v) {
  _volume = Math.max(0, Math.min(1, parseFloat(v)));
  if (_audio) _audio.volume = _volume;
  try { localStorage.setItem('bt_volume', _volume); } catch(e) {}
}
function loadVolume() {
  try { const v = localStorage.getItem('bt_volume'); if (v !== null) { const p = parseFloat(v); if (!isNaN(p)) _volume = Math.max(0, Math.min(1, p)); } } catch(e) {}
}

function stopAudio() {
  if (_audio) { try { _audio.pause(); } catch(e){} _audio.src = ''; _audio = null; }
  clearInterval(_uiTimer);
}

// ── PRÉCHARGEMENT ─────────────────────────────────────────────
// On commence à télécharger l'audio dès qu'on connaît l'URL,
// avant même la navigation — gain de 1-4 secondes sur Archive.org
let _preloadAudio = null;
function preloadAudio(url) {
  if (!url) return;
  // Si la chanson est déjà en cache blob, pas besoin d'un élément Audio supplémentaire
  if (_audioCache.has(url)) return;
  if (_preloadAudio && _preloadAudio._url === url) return; // déjà en cours
  if (_preloadAudio) { try { _preloadAudio.src = ''; } catch(e){} _preloadAudio = null; }
  const a = new Audio();
  a.preload = 'auto';
  a._url = url;
  a.src = url;
  _preloadAudio = a;
}

// ── CACHE AUDIO BLOB ──────────────────────────────────────────────────────────
// Télécharge toutes les chansons en mémoire (Blob) dès que la queue est connue.
// playSegment utilise la blobURL si disponible → lecture instantanée, zéro saut.
const _audioCache    = new Map(); // originalUrl → blobUrl
const _prefetchBusy  = new Set(); // urls en cours de fetch
let   _prefetchDone  = 0;
let   _prefetchTotal = 0;

async function _fetchToCache(url) {
  if (!url || _audioCache.has(url) || _prefetchBusy.has(url)) return;
  _prefetchBusy.add(url);
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const blob = await resp.blob();
    _audioCache.set(url, URL.createObjectURL(blob));
    _prefetchDone++;
    _updatePrefetchUI();
    console.log(`[AudioCache] ✅ ${_prefetchDone}/${_prefetchTotal} — ${url.split('/').pop()}`);
  } catch(e) {
    console.warn('[AudioCache] ❌ Échec :', url.split('/').pop(), e.message);
  } finally {
    _prefetchBusy.delete(url);
  }
}

function prefetchQueue(songs, concurrency = 3) {
  if (!songs || !songs.length) return;
  const urls = songs.map(s => s.url).filter(u => u && !_audioCache.has(u) && !_prefetchBusy.has(u));
  if (!urls.length) return;
  _prefetchDone = 0;
  _prefetchTotal = urls.length;
  _updatePrefetchUI();
  let i = 0;
  const runNext = () => {
    if (i >= urls.length) return;
    const url = urls[i++];
    _fetchToCache(url).then(runNext);
  };
  for (let c = 0; c < Math.min(concurrency, urls.length); c++) runNext();
}

function _updatePrefetchUI() {
  const el = document.getElementById('prefetch-status');
  if (!el) return;
  if (_prefetchTotal === 0) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  if (_prefetchDone >= _prefetchTotal) {
    el.innerHTML = `<span style="color:var(--green)">✅ ${_prefetchTotal} chansons prêtes — aucun saut possible !</span>`;
    setTimeout(() => { if (el) el.style.display = 'none'; }, 4000);
  } else {
    const pct = Math.round((_prefetchDone / _prefetchTotal) * 100);
    el.innerHTML = `
      <span style="color:var(--tx3)">⬇️ Pré-chargement</span>
      <span style="font-weight:800;color:var(--player)">${_prefetchDone}/${_prefetchTotal}</span>
      <div style="flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:var(--player);border-radius:2px;transition:width .3s"></div>
      </div>`;
  }
}

function _clearAudioCache() {
  _audioCache.forEach(blobUrl => { try { URL.revokeObjectURL(blobUrl); } catch(e){} });
  _audioCache.clear();
  _prefetchBusy.clear();
  _prefetchDone = 0;
  _prefetchTotal = 0;
}

function playSegment(url, startMode, duration, { onEnd, onTick, onPlay, getSyncTime } = {}) {
  stopAudio();

  // ── Résolution blob cache ────────────────────────────────────
  url = _audioCache.get(url) || url;

  // Réutiliser le préchargement si l'URL correspond
  if (_preloadAudio && _preloadAudio._url === url && !_preloadAudio.error) {
    _audio = _preloadAudio;
    _preloadAudio = null;
  } else {
    if (_preloadAudio) { try { _preloadAudio.src = ''; } catch(e){} _preloadAudio = null; }
    _audio = new Audio(url);
  }
  _audio.preload = 'auto';
  _audio.volume = _volume;

  _audio.addEventListener('loadedmetadata', () => {
    if (!_audio) return;
    const total = _audio.duration || 200;
    const maxStart = Math.max(0, total - duration - 3);
    const baseStart = startMode === 'aleatoire' ? Math.random() * maxStart : 0;

    // ── Calcul de la position de seek (1ère lecture de getSyncTime) ────────
    // On lit le roundStartTime DE L'HÔTE dès qu'on connaît les métadonnées.
    // Si un 2e broadcast arrive pendant le seek, on relit le temps au moment
    // de _startPlayback() pour la durée ajustée → double compensation.
    const _getLag = () => {
      const refTime = getSyncTime ? getSyncTime() : 0;
      return (refTime > 0) ? Math.max(0, (Date.now() - refTime) / 1000 - 0.15) : 0;
    };
    const startAt = Math.min(baseStart + _getLag(), Math.max(0, total - 4));

    const _startPlayback = () => {
      if (!_audio) return;
      // 2e lecture : lag recalculé après le seek (le broadcast précis de l'hôte
      // a pu arriver entre loadedmetadata et la fin du seek)
      const lag = _getLag();
      const adjustedDur = lag > 0.5 ? Math.max(3, duration - lag) : duration;

      const p = _audio.play();
      if (p && typeof p.catch === 'function') {
        p.catch(() => setTimeout(() => { if (_audio) _audio.play().catch(() => {}); }, 400));
      }

      // ── Utiliser l'événement 'playing' plutôt que le retour de play() ───
      // Garantit que l'audio joue réellement avant de démarrer les timers.
      // Critique sur iOS Safari où play() est résolu avant la lecture effective.
      _audio.addEventListener('playing', () => {
        onPlay && onPlay();
        onTick && onTick(adjustedDur, duration);
        const endAt = Date.now() + adjustedDur * 1000;
        _uiTimer = setInterval(() => {
          const rem = Math.max(0, (endAt - Date.now()) / 1000);
          onTick && onTick(rem, duration);
          if (rem <= 0) { clearInterval(_uiTimer); stopAudio(); onEnd && onEnd(); }
        }, 100);
      }, { once: true });
    };

    if (startAt > 0.5) {
      let _seekDone = false;
      const _onSeeked = () => { if (_seekDone) return; _seekDone = true; _startPlayback(); };
      _audio.addEventListener('seeked', _onSeeked, { once: true });
      // Filet de sécurité si 'seeked' ne se déclenche pas (certains formats/navigateurs)
      setTimeout(() => { if (!_seekDone && _audio) { _seekDone = true; _startPlayback(); } }, 2500);
      _audio.currentTime = startAt;
    } else {
      _startPlayback();
    }
  });

  _audio.addEventListener('error', (e) => {
    console.warn('[Audio] Erreur de chargement :', url, e);
    stopAudio();
    onEnd && onEnd();
  });
}

function parseName(filename) {
  const name = filename.replace(/\.[^.]+$/, '');
  const i = name.indexOf(' - ');
  if (i > -1) return { artist: name.slice(0, i).trim(), title: name.slice(i + 3).trim() };
  return { artist: 'Inconnu', title: name.trim() };
}

function handleAudioFiles(files) {
  const arr = Array.from(files).filter(f => /\.(mp3|wav|ogg|m4a|flac|aac|webm)$/i.test(f.name) || f.type.startsWith('audio/'));
  S.songs.filter(s => s.file !== null).forEach(s => { try { URL.revokeObjectURL(s.url); } catch(e) {} });
  const newSongs = arr.map(f => {
    const { artist, title } = parseName(f.name);
    return { file: f, name: f.name, url: URL.createObjectURL(f), artist, title };
  });
  const serverSongs = S.songs.filter(s => s.file === null);
  S.songs = [...serverSongs, ...newSongs];
  render();
}

let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
function playCorrectSound() {
  try {
    const ctx = getAudioCtx();
    const t = ctx.currentTime;
    // Deux notes montantes : Do → Mi
    [[523, t, .08], [659, t+.1, .12]].forEach(([freq, start, dur]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(.25, start);
      gain.gain.exponentialRampToValueAtTime(.001, start + dur);
      osc.start(start); osc.stop(start + dur);
    });
  } catch(e) {}
}
function playWrongSound() {
  try {
    const ctx = getAudioCtx();
    const t = ctx.currentTime;
    // Bruit court descendant façon buzzer
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + .25);
    gain.gain.setValueAtTime(.3, t);
    gain.gain.exponentialRampToValueAtTime(.001, t + .25);
    osc.start(t); osc.stop(t + .25);
  } catch(e) {}
}

async function ablyConnect() {
  if (_ablyClient && _ablyClient.connection.state === 'connected') return;
  setConnDot('connecting');
  return new Promise((res, rej) => {
    _ablyClient = new Ably.Realtime({
      key: ABLY_KEY,
      clientId: 'user-' + Math.random().toString(36).slice(2,8),
      disconnectedRetryTimeout: 3000,
      suspendedRetryTimeout: 8000,
    });
    let resolved = false;
    const _ablyTimeout = setTimeout(() => {
      if (!resolved) { resolved = true; rej(new Error('Timeout — vérifie ta connexion internet')); }
    }, 14000);
    _ablyClient.connection.on(stateChange => {
      const st = stateChange.current;
      if (st === 'connected') {
        clearTimeout(_ablyTimeout);
        setConnDot('connected');
        hideNetBanner();
        if (!resolved) { resolved = true; res(); return; }
        // Reconnexion pendant une partie
        if (_multi) {
          showToast('📡 Connexion restaurée !', 2500);
          if (_multi.role === 'host' && _ablyChan) {
            setTimeout(() => _hostBroadcast(), 500);
          }
        }
      } else if (st === 'failed') {
        clearTimeout(_ablyTimeout);
        setConnDot('failed');
        showNetBanner();
        if (!resolved) { resolved = true; rej(new Error('Connexion Ably échouée')); }
      } else if (st === 'disconnected' || st === 'suspended') {
        setConnDot('connecting');
        showNetBanner();
        if (_multi) showToast('⚠️ Connexion perdue — reconnexion…', 3500);
      }
    });
  });
}

function startPlayerTimer(startTime, dur) {
  clearInterval(_playerTimer);

    // Barre de progression (fallback)

    // Arc SVG (même style que local)

    const color = elapsed > dur * 0.75 ? 'var(--r)' : elapsed > dur * 0.5 ? 'var(--y)' : 'var(--g)';
    if (bar) {
      bar.style.width = (rem / dur * 100) + '%';
      bar.className   = 'prog-fill' + (rem <= 5 ? ' urgent' : '');
    }
    if (txt) {
      txt.textContent = Math.ceil(rem) + 's';
      txt.className   = 'timer-countdown' + (rem <= 5 ? ' urgent' : '');
    }
    if (arc) {
      arc.setAttribute('stroke-dasharray', `${pct} 100`);

    }
    if (arcTxt) {
      arcTxt.textContent = elapsed.toFixed(1) + 's';
      arcTxt.style.color = color;

  }, 100);
}
