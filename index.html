        _multi.streaks[name] = (_multi.streaks[name] || 0) + 1;
        if (_multi.streaks[name] > (_multi.maxStreaks[name] || 0)) _multi.maxStreaks[name] = _multi.streaks[name];
        _multi.correctCount[name] = (_multi.correctCount[name] || 0) + 1;
        if (!_multi.correctResponseTimes[name]) _multi.correctResponseTimes[name] = [];
        _multi.correctResponseTimes[name].push(_answerTime);
        const elapsedSecs = _answerTime / 1000;
        const ptsInfo = calcPoints(_multi.diff, elapsedSecs, _multi.roundDur, _multi.streaks[name], false, true);
        _multi.scores[name] = (_multi.scores[name] || 0) + ptsInfo.total;
        _multi.roundPts[name] = ptsInfo;
      } else {
        _multi.streaks[name] = 0;
        _multi.roundPts[name] = null;
      }
      const p = _multi.players.find(p => p.name === name);
      if (p) { p.answered = true; p.correct = ok; }
      _hostBroadcast();
      if (S.screen === 'multi-game') render();
      // Auto-reveal si tout le monde a répondu
      if (_multi.players.length > 0 && _multi.players.every(p => p.answered)) {
        setTimeout(() => { if (_multi && _multi.phase === 'playing') multiHostReveal(true); }, 1500);
      }
    });

    _ablyChan.subscribe('player:reaction', msg => {
      showReactionFloat(msg.data.emoji || '🔥');
    });

    goto('multi-lobby');

    // ── Heartbeat hôte → joueurs (toutes les 10s) ──────────────
    // Permet au watchdog côté joueur de savoir que l'hôte est toujours là,
    // même entre deux rounds (lobby / answered sans activité).
    const _heartbeatInterval = setInterval(() => {
      if (!_ablyChan || !_multi || _multi.role !== 'host') { clearInterval(_heartbeatInterval); return; }
      _ablyChan.publish('host:heartbeat', { ts: Date.now() });
    }, 10000);

    // Le canal heartbeat réinitialise aussi le watchdog côté joueur
    // On connaît déjà le pool de chansons → on commence à tout
    // mettre en cache Blob pendant que les joueurs rejoignent.
    // Comme ça, quand la partie démarre tout est prêt.
    {
      const _prePool = (S.btCfg?.selectedArtists?.length > 0)
        ? S.songs.filter(s => S.btCfg.selectedArtists.includes(s.artist))
        : S.songs;
      const _preN = (_multi.rounds === 9999) ? _prePool.length : Math.min(_multi.rounds, _prePool.length);
      // Mélange aléatoire pour prioriser les chansons qui seront dans la queue
      const _preSample = _prePool.slice().sort(() => Math.random() - .5).slice(0, _preN);
      _prefetchDone = 0; _prefetchTotal = 0;
      prefetchQueue(_preSample);
    }
  } catch(e) {
    alert('Erreur : ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '🚀 Lancer la salle'; }
  }
}

// ── JOUEUR : Rejoindre la salle ────────────────────────────────
async function multiJoinRoom(code, name) {
  code = (code||'').toUpperCase().trim();
  name = (name||'').trim();
  if (!code || !name) { alert('Entre le code et ton prénom !'); return; }
  if (code.length !== 5) { alert('Le code doit faire exactement 5 caractères.'); return; }
  const btn = document.getElementById('multi-join-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Connexion…'; }
  try {
    await ablyConnect();
    _ablyChan = _ablyClient.channels.get('blindtest-' + code);
    _multi = {
      role: 'player', roomCode: code, playerName: name,
 // sera mis à jour par host:state
      phase: 'lobby', players: [], scores: {},
      round: 0, totalRounds: 0,
      currentQuestion: null, reveal: null,
      myAnswer: null, allAnswers: {},
      diff: 'facile', _lastRound: -1,
      roundStartTime: 0, roundDur: 30,
      responseTimes: {},
    };

    // Refus nom doublon
    _ablyChan.subscribe('host:reject', msg => {
      if (msg.data.name === name) {
        alert('❌ ' + (msg.data.reason || 'Connexion refusée.'));
        ablyDisconnect();
        goto('multi-setup');
      }
    });

    _ablyChan.subscribe('host:state', msg => {
      const st = msg.data;
      const wasPhase      = _multi.phase;
      const wasChoicesLen = _multi.currentQuestion?.choices?.length || 0;

      _multi.phase           = st.phase;
      _multi.gameType        = st.gameType        || 'bt';
      _multi.players         = st.players         || [];
      _multi.scores          = st.scores          || {};
      _multi.streaks         = st.streaks         || {};
      _multi.roundPts        = st.roundPts        || {};
      _multi.round           = st.round           || 0;
      _multi.totalRounds     = st.totalRounds     || 0;
      _multi.currentQuestion = st.currentQuestion || null;

      _multi.reveal          = st.reveal          || null;
      _multi.allAnswers      = st.answers         || {};
      _multi.diff            = st.diff            || 'facile';
      _multi.roundStartTime  = st.roundStartTime  || Date.now();
      _multi.roundDur        = st.roundDur        || BT_DIFF[_multi.diff].dur;
      _multi.responseTimes   = st.responseTimes   || {};
      _multi.correctCount    = st.correctCount    || {};
      _multi.maxStreaks       = st.maxStreaks       || {};
      if (st.finalBonuses !== null && st.finalBonuses !== undefined) _multi.finalBonuses = st.finalBonuses;

      // ── Correction de la synchro d'horloge ──────────────────────────────
      // roundStartTime vient de l'hôte (son Date.now()) et peut différer de
      // plusieurs secondes du joueur. On recalcule en local :
      //   msg.timestamp  = heure Ably (serveur) de réception du message
      //   st.elapsedMs   = ms écoulées entre startAudio et le broadcast
      //   serverLag      = latence serveur → joueur
      // → roundStartTime joueur ≈ maintenant - elapsedMs - serverLag
      if (st.phase === 'playing' && st.elapsedMs != null && msg.timestamp) {
        const serverLag = Math.max(0, Date.now() - msg.timestamp);
        _multi.roundStartTime = Date.now() - st.elapsedMs - serverLag;
      }

      // Détecter si un nouveau round doit démarrer (BT seulement)
      const isNewRound = _multi._lastRound !== st.round;
      let _pendingAudioUrl = null;
      let _pendingAudioDur = 0;
      let _pendingAudioStart = 'debut';
      if (st.phase === 'playing' && isNewRound) {
        _multi._lastRound = st.round;
        _multi.myAnswer   = null;
        clearPlayerTimer(); // stopper l'ancien timer immédiatement, pas attendre onPlay
        _pendingAudioUrl   = st.currentQuestion?.songUrl || null;
        _pendingAudioDur   = _multi.roundDur || BT_DIFF[_multi.diff].dur;
        _pendingAudioStart = st.currentQuestion?.startMode || 'debut';
        // ── PRÉCHARGEMENT ANTICIPÉ ──────────────────────────────
        // On télécharge l'audio en Blob MAINTENANT pour une lecture
        // instantanée quand playSegment est appelé.
        if (_pendingAudioUrl) _fetchToCache(_pendingAudioUrl);
        // Pré-télécharger aussi la chanson suivante si connue
        if (st.nextSongUrl) _fetchToCache(st.nextSongUrl);
      }

      // Sons & vibrations contextuels
      const newChoicesLen = _multi.currentQuestion?.choices?.length || 0;
      if (st.phase === 'playing' && newChoicesLen > 0 && wasChoicesLen === 0) {
        _multiPlayChoicesSound();
        try { navigator.vibrate(80); } catch(e) {}
      }
      if (st.phase === 'answered' && wasPhase === 'playing') {
        stopAudio();
        clearPlayerTimer();
        if (_multi.myAnswer !== null) {
          const ok = norm(_multi.myAnswer) === norm(_multi.reveal?.correct || '');
          ok ? playCorrectSound() : playWrongSound();
          try { navigator.vibrate(ok ? [100,50,100] : [250]); } catch(e) {}
        }
      }

      if (st.phase === 'finished') { _clearAudioCache(); goto('multi-results'); return; }
      if (wasPhase === 'lobby' && (st.phase === 'playing' || st.phase === 'answered')) {
        _multiPlayRoundStartSound();
        goto('multi-game'); // goto appelle stopAudio() — on lance le son APRES
      } else if (S.screen === 'multi-lobby' || S.screen === 'multi-game') {
        render();
      }

      // Lancer la musique APRES la navigation (goto aurait tué le son sinon)
      // On attend que le blob soit en cache pour éviter le cold-start streaming
      // (3-5s de buffering). La compensation de lag gère le délai d'attente.
      if (_pendingAudioUrl) {
        const _urlToPlay  = _pendingAudioUrl;
        const _startMode  = _pendingAudioStart;
        const _dur        = _pendingAudioDur;
        const _roundIdx   = _multi.round;

        const _doPlay = () => {
          if (!_multi || _multi.phase !== 'playing' || _multi.round !== _roundIdx) return;
          playSegment(_urlToPlay, _startMode, _dur, {
            getSyncTime: () => _multi?.roundStartTime || 0,
            onPlay: () => {
              if (_multi && _multi.myAnswer === null && _multi.phase === 'playing') {
                startPlayerTimer(_multi.roundStartTime, _multi.roundDur);
              }
            }
          });
        };

        if (_audioCache.has(_urlToPlay)) {
          _doPlay(); // blob déjà prêt → lecture immédiate
        } else {
          // Polling jusqu'à ce que le blob soit prêt (max 6s, puis fallback streaming)
          let _waited = 0;
          const _waitId = setInterval(() => {
            _waited += 100;
            if (_audioCache.has(_urlToPlay) || _waited >= 6000) {
              clearInterval(_waitId);
              _doPlay();
            }
          }, 100);
        }
      }

    });

    _ablyChan.subscribe('player:reaction', msg => {
      showReactionFloat(msg.data.emoji || '🔥');
    });

    // ── Détection déconnexion hôte ─────────────────────────────
    // Si aucun message host:state depuis 20s → l'hôte est probablement parti
    const _resetHostWatchdog = () => {
      clearTimeout(_hostWatchdog);
      _hostWatchdog = setTimeout(() => {
        if (!_multi || _multi.role !== 'player') return;
        if (S.screen === 'multi-lobby' || S.screen === 'multi-game') {
          // Proposer de revenir au menu via un toast cliquable
          const old = document.getElementById('_toast');
          if (old) old.remove();
          const t = document.createElement('div');
          t.id = '_toast';
          t.className = 'toast';
          t.style.cssText += ';cursor:pointer;border-color:var(--red);color:var(--red);bottom:100px';
          t.textContent = '⚠️ Hôte déconnecté — appuie pour quitter';
          t.onclick = () => { ablyDisconnect(); goto('multi-setup'); };
          document.body.appendChild(t);
          // Auto-retour au menu après 8s si pas de clic
          setTimeout(() => {
            if (_multi && _multi.role === 'player') { ablyDisconnect(); goto('multi-setup'); }
          }, 8000);
        }
      }, 20000);
    };
    _ablyChan.subscribe('host:state', () => _resetHostWatchdog());
    _ablyChan.subscribe('host:heartbeat', () => _resetHostWatchdog()); // heartbeat léger
    _resetHostWatchdog();

    _ablyChan.publish('player:join', { name });
    goto('multi-lobby');
  } catch(e) {
    alert('Erreur : ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '▶ Rejoindre'; }
  }
}

// ── Logique hôte ───────────────────────────────────────────────
function _multiCheckAnswer(val, song) {
  if (!val || !song) return false;
  const n = norm(val);
  return n === norm(song[_multi.field]);
}

function _hostBroadcast() {
  if (!_ablyChan || !_multi || _multi.role !== 'host') return;
  const song = _multi.queue ? _multi.queue[_multi.round] : null;
  _ablyChan.publish('host:state', {
    phase          : _multi.phase,
    gameType       : _multi.gameType || 'bt',
    players        : _multi.players,
    scores         : _multi.scores,
    streaks        : _multi.streaks || {},
    roundPts       : _multi.phase === 'answered' ? (_multi.roundPts || {}) : {},
    round          : _multi.round,
    totalRounds    : _multi.queue ? _multi.queue.length : 0,
    diff           : _multi.diff,
    answers        : _multi.phase === 'answered' ? _multi.answers : {},
    responseTimes  : _multi.responseTimes || {},
    correctCount   : _multi.correctCount || {},
    maxStreaks     : _multi.maxStreaks || {},
    finalBonuses   : _multi.phase === 'finished' ? (_multi.finalBonuses || []) : null,
    roundStartTime : _multi.roundStartTime,
    roundDur       : _multi.roundDur,
    // Temps écoulé depuis le début du round au moment du broadcast.
    // Permet aux joueurs de calculer le lag sans dépendre de la synchro d'horloge.
    elapsedMs      : (_multi.phase === 'playing' && _multi.roundStartTime > 0)
                       ? Math.max(0, Date.now() - _multi.roundStartTime) : 0,
    // BT
    currentQuestion: (song && (_multi.phase==='playing'||_multi.phase==='answered')) ? {
      choices  : _multi.currentChoices,
      field    : _multi.field,
      songUrl  : song.url || null,
      startMode: S.btCfg?.start || 'debut',
    } : null,
    // URL de la chanson suivante → les joueurs commencent à la télécharger en avance
    nextSongUrl: (() => {
      const next = _multi.queue ? _multi.queue[_multi.round + 1] : null;
      return next ? (next.url || null) : null;
    })(),
    reveal: (song && _multi.phase === 'answered') ? {
      correct : _multi.field === 'artist' ? song.artist : song.title,
      artist  : song.artist, title: song.title,
    } : null,
  });
}

function multiHostStart() {
  if (!_multi || _multi.role !== 'host') return;


  if (!S.songs.length) { alert('Charge des chansons d\'abord !'); return; }
  const _multiPool = (S.btCfg?.selectedArtists?.length > 0)
    ? S.songs.filter(s => S.btCfg.selectedArtists.includes(s.artist))
    : S.songs;
  const _usedPool = _multiPool.length > 0 ? _multiPool : S.songs;
  const n = _multi.rounds === 9999 ? _usedPool.length : Math.min(_multi.rounds, _usedPool.length);
  _multi.queue  = _usedPool.slice().sort(() => Math.random()-.5).slice(0, n);
  // Les chansons sont déjà en cours de téléchargement depuis la création du lobby.
  // On lance juste un prefetch de rattrapage pour les éventuelles chansons manquantes.
  _multi.round  = 0;
  _multi.scores = {};
  _multi.streaks = {};
  _multi.maxStreaks = {};
  _multi.correctCount = {};
  _multi.correctResponseTimes = {};
  _multi.halfTimeScores = null;
  _multi.lastRoundCorrect = {};
  _multi.roundPts = {};
  _multi.responseTimes = {};
  _multi.finalBonuses = null;
  _multi.players.forEach(p => {
    _multi.scores[p.name] = 0;
    _multi.streaks[p.name] = 0;
    _multi.maxStreaks[p.name] = 0;
    _multi.correctCount[p.name] = 0;
    _multi.correctResponseTimes[p.name] = [];
    _multi.responseTimes[p.name] = [];
    p.answered = false;
    p.correct = undefined;
  });
  _multiHostStartRound();
}

function _multiHostStartRound() {
  if (!_multi) return;
  const song = _multi.queue[_multi.round];
  _multi.answers = {};
  _multi.myAnswer = null;
  _multi.roundPts = {};
  _multi.players.forEach(p => { p.answered = false; p.correct = undefined; });
  _multi.phase = 'playing';
  _multi.roundDur = BT_DIFF[_multi.diff].dur;
  clearInterval(_hostSvgTimer); _hostSvgTimer = null;

  // ── BT ──
  const _mField = _multi.field;
  const _mCorrect = song[_mField];
  // Filtrer le pool selon les artistes sélectionnés (comme pour la queue)
  const _mFilteredSongs = (S.btCfg?.selectedArtists?.length > 0)
    ? S.songs.filter(s => S.btCfg.selectedArtists.includes(s.artist))
    : S.songs;
  const _mPool = _mField === 'artist'
    ? [...new Set(_mFilteredSongs.map(s => s.artist).filter(a => a !== _mCorrect))]
    : [...new Set(_mFilteredSongs.map(s => s.title).filter(t => t !== _mCorrect))];
  let _mWrong = _mPool.sort(() => Math.random() - .5).slice(0, 3);
  while (_mWrong.length < 3) _mWrong.push('???');
  _multi.currentChoices = [..._mWrong, _mCorrect].sort(() => Math.random() - .5);

  // Envoie l'état + les choix aux joueurs avant de naviguer
  _multi.roundStartTime = Date.now(); // approximation initiale
  _hostBroadcast();

  // Navigation sans toucher à l'audio — playSegment s'en charge lui-même via stopAudio()
  goto('multi-game', { keepAudio: true });
  _multiPlayRoundStartSound();

  playSegment(song.url, S.btCfg?.start || 'debut', _multi.roundDur, {
    onPlay: () => {
      // Temps précis : l'audio joue réellement ici
      _multi.roundStartTime = Date.now();
      _hostBroadcast();
      clearInterval(_hostSvgTimer);
      const _st = _multi.roundStartTime;
      const _dr = _multi.roundDur;
      _hostSvgTimer = setInterval(() => {
        const elapsed = (Date.now() - _st) / 1000;
        const rem   = Math.max(0, _dr - elapsed);
        const pct   = _dr > 0 ? Math.min(100, (elapsed / _dr) * 100) : 0;
        const color = elapsed > _dr * 0.75 ? 'var(--r)' : elapsed > _dr * 0.5 ? 'var(--y)' : 'var(--g)';
        const arc    = document.getElementById('host-speed-prog');
        const arcTxt = document.getElementById('host-speed-elapsed');
        const bar    = document.getElementById('host-timer-bar');
        const txt    = document.getElementById('host-timer-txt');
        if (arc)    { arc.setAttribute('stroke-dasharray', `${pct} 100`); arc.setAttribute('stroke', color); }
        if (arcTxt) { arcTxt.textContent = elapsed.toFixed(1) + 's'; arcTxt.style.color = color; }
        if (bar)    { bar.style.width = (rem / _dr * 100) + '%'; }
        if (txt)    { txt.textContent = Math.ceil(rem) + 's'; }
        if (rem <= 0) clearInterval(_hostSvgTimer);
      }, 100);
    },
    onEnd: () => { if (_multi && _multi.phase === 'playing') multiHostReveal(true); }
  });
}

function multiHostReveal(force) {
  if (!_multi || _multi.phase !== 'playing') return;

  // Si l'hôte n'a pas encore répondu et qu'il y a des choix disponibles,
  // demander confirmation pour éviter une révélation accidentelle
  const hasChoices = (_multi.currentChoices || []).length > 0;
  if (!force && _multi.myAnswer === null && hasChoices) {
    // Afficher un toast-confirm discret plutôt qu'un alert bloquant
    const old = document.getElementById('_reveal-confirm');
    if (old) { old.remove(); return; }
    const box = document.createElement('div');
    box.id = '_reveal-confirm';
    box.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:500;background:var(--bg2);border:1.5px solid var(--red);border-radius:14px;padding:14px 18px;text-align:center;max-width:300px;width:90%;box-shadow:0 0 24px rgba(248,113,113,.35)';
    box.innerHTML = `<p style="font-size:.82rem;font-weight:800;color:var(--red);margin-bottom:8px">⚠️ Tu n'as pas encore répondu !</p>
      <p style="font-size:.75rem;color:var(--tx3);margin-bottom:12px">Sélectionne d'abord une réponse, ou révèle quand même.</p>
      <div style="display:flex;gap:8px;justify-content:center">
        <button onclick="document.getElementById('_reveal-confirm').remove()" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--tx);font-weight:800;font-size:.75rem;cursor:pointer">Annuler</button>
        <button onclick="document.getElementById('_reveal-confirm').remove();multiHostReveal(true)" style="flex:1;padding:8px;border-radius:8px;border:none;background:var(--red);color:#fff;font-weight:800;font-size:.75rem;cursor:pointer">Révéler quand même</button>
      </div>`;
    document.body.appendChild(box);
    setTimeout(() => { if (box.parentNode) box.remove(); }, 6000);
    return;
  }
  const old2 = document.getElementById('_reveal-confirm');
  if (old2) old2.remove();

  // Délai minimum de 4s pour éviter révélation immédiate si erreur audio
  const elapsed = Date.now() - (_multi.roundStartTime || 0);
  const MIN_MS  = 4000;
  if (elapsed < MIN_MS) {
    setTimeout(() => { if (_multi && _multi.phase === 'playing') multiHostReveal(true); }, MIN_MS - elapsed);
    return;
  }
  stopAudio();
  _multi.phase = 'answered';

  const nRounds = _multi.queue ? _multi.queue.length : 0;

  // Snapshot mi-parcours pour le bonus REMONTADA (à exactement 50% des rounds)
  if (_multi.round === Math.floor(nRounds * 0.5) && !_multi.halfTimeScores) {
    _multi.halfTimeScores = { ..._multi.scores };
  }

  // Stocker qui a répondu juste sur la dernière musique (bonus LAST CALL)
  if (_multi.round === nRounds - 1) {
    const lastSong = _multi.queue[_multi.round];
    _multi.lastRoundCorrect = {};
    _multi.players.forEach(p => {
      const ans = _multi.answers[p.name];
      _multi.lastRoundCorrect[p.name] = (ans !== undefined && ans !== null && _multiCheckAnswer(ans, lastSong));
    });
  }

  _hostBroadcast();
  render();
}

function multiHostNext() {
  if (!_multi) return;
  _multi.round++;
  if (_multi.round >= _multi.queue.length) {
    // ── Calcul et application des bonus de fin de partie ──
    const bonusResult = calcFinalBonuses(_multi);
    _multi.finalBonuses = bonusResult.bonuses;
    Object.entries(bonusResult.byPlayer).forEach(([name, pts]) => {
      if (pts > 0) _multi.scores[name] = (_multi.scores[name] || 0) + pts;
    });
    _multi.phase = 'finished';
    // Sauvegarder dans l'historique
    const ranked = Object.entries(_multi.scores).sort((a,b) => b[1]-a[1]);
    saveGameHistory({
      ts: Date.now(),
      date: new Date().toLocaleDateString('fr-FR'),
      winner: ranked[0] ? ranked[0][0] : '—',
      players: _multi.players.map(p => ({
        name: p.name,
        score: _multi.scores[p.name] || 0,
        correct: _multi.correctCount ? (_multi.correctCount[p.name] || 0) : 0,
      })),
      rounds: _multi.queue.length,
      diff: _multi.diff || 'facile',
      myName: getUserPseudo(),
    });
    _hostBroadcast();
    _clearAudioCache(); // libérer les blobs, la partie est terminée
    goto('multi-results');
    return;
  }
  _multiHostStartRound();
}

function multiPlayerAnswer(val) {
  if (!_multi || _multi.role !== 'player') return;
  if (_multi.myAnswer !== null || _multi.phase !== 'playing') return;
  _multi.myAnswer = val;
  _ablyChan.publish('player:answer', { name: _multi.playerName, value: val });
  try { navigator.vibrate(60); } catch(e) {}
  render();
}

function multiHostAnswer(val) {
  if (!_multi || _multi.role !== 'host') return;
  if (_multi.myAnswer !== null || _multi.phase !== 'playing') return;
  const song = _multi.queue[_multi.round];
  const ok = _multiCheckAnswer(val, song);
  _multi.myAnswer = val;
  _multi.answers[_multi.hostName] = val;
  const _hostAnswerTime = Date.now() - (_multi.roundStartTime || Date.now());
  if (!_multi.responseTimes) _multi.responseTimes = {};
  if (!_multi.responseTimes[_multi.hostName]) _multi.responseTimes[_multi.hostName] = [];
  _multi.responseTimes[_multi.hostName].push(_hostAnswerTime);
  if (!_multi.streaks) _multi.streaks = {};
  if (!_multi.roundPts) _multi.roundPts = {};
  if (ok) {
    _multi.streaks[_multi.hostName] = (_multi.streaks[_multi.hostName] || 0) + 1;
    if (_multi.streaks[_multi.hostName] > (_multi.maxStreaks[_multi.hostName] || 0)) _multi.maxStreaks[_multi.hostName] = _multi.streaks[_multi.hostName];
    _multi.correctCount[_multi.hostName] = (_multi.correctCount[_multi.hostName] || 0) + 1;
    if (!_multi.correctResponseTimes[_multi.hostName]) _multi.correctResponseTimes[_multi.hostName] = [];
    _multi.correctResponseTimes[_multi.hostName].push(_hostAnswerTime);
    const elapsedSecs = _hostAnswerTime / 1000;
    const ptsInfo = calcPoints(_multi.diff, elapsedSecs, _multi.roundDur, _multi.streaks[_multi.hostName], false, true);
    _multi.scores[_multi.hostName] = (_multi.scores[_multi.hostName] || 0) + ptsInfo.total;
    _multi.roundPts[_multi.hostName] = ptsInfo;
  } else {
    _multi.streaks[_multi.hostName] = 0;
    _multi.roundPts[_multi.hostName] = null;
  }
  const p = _multi.players.find(p => p.name === _multi.hostName);
  if (p) { p.answered = true; p.correct = ok; }
  if (_multi.players.every(p => p.answered)) {
    setTimeout(() => { if (_multi && _multi.phase === 'playing') multiHostReveal(true); }, 1500);
  }
  try { navigator.vibrate(60); } catch(e) {}
  render();
}


function _multiPlayChoicesSound() {
  try {
    const ctx = getAudioCtx();
    [440, 554].forEach((freq, i) => setTimeout(() => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .09);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + .09);
    }, i * 80));
  } catch(e) {}
}
function _multiPlayRoundStartSound() {
  try {
    const ctx = getAudioCtx();
    [660, 880].forEach((freq, i) => setTimeout(() => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(.18, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .07);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + .07);
    }, i * 70));
  } catch(e) {}
}

function importPlaylistJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let arr = JSON.parse(e.target.result);
      if (!Array.isArray(arr)) throw new Error('Le fichier doit contenir un tableau JSON');
      const valid = arr.filter(s => s.url && (s.title || s.artist));
      if (!valid.length) throw new Error('Aucun titre valide trouvé (champs requis: url + title ou artist)');
      const existingUrls = new Set(S.songs.map(s => s.url));
      let added = 0;
      valid.forEach(s => {
        if (!existingUrls.has(s.url)) {
          S.songs.push({ file: null, name: s.title || s.artist || 'Inconnu', url: s.url, artist: s.artist || '', title: s.title || '' });
          existingUrls.add(s.url);
          added++;
        }
      });
      saveServerDataToIDB();
      S.musicCardOpen = false;
      render();
      showToast(`✅ ${added} titre${added>1?'s':''} importé${added>1?'s':''}  (${valid.length - added} dupliqué${valid.length - added > 1?'s':''} ignoré${valid.length - added > 1?'s':''})`, 4000);
    } catch(err) {
      showToast('❌ Erreur JSON : ' + err.message, 4500);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function shareScore() {
  if (!_multi) return;
  const scores  = _multi.scores || {};
  const ranked  = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const nRounds = _multi.queue ? _multi.queue.length : 0;
  const diff    = _multi.diff || 'facile';
  const DIFF_ICONS = { facile:'🟢', inter:'🟡', difficile:'🟠', hard:'🔴' };
  const diffIcon = DIFF_ICONS[diff] || '🎵';
  const winner = ranked[0] ? ranked[0][0] : '—';
  const lines = ranked.map(([ name, score ], i) => {
    const medal = ['🥇','🥈','🥉'][i] || `#${i+1}`;
    const correct = _multi.correctCount ? (_multi.correctCount[name] || 0) : '?';
    return `${medal} ${name} — ${score.toLocaleString()} pts (${correct}/${nRounds})`;
  }).join('\n');
  const text = `🎵 BlindTest Pro\n${diffIcon} ${diff.toUpperCase()} · ${nRounds} manches\n\n${lines}\n\n🏆 Vainqueur : ${winner}`;

  if (navigator.share) {
    navigator.share({ title: 'BlindTest Pro — Résultats', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text)
      .then(() => showToast('📋 Résultats copiés dans le presse-papiers !', 3000))
      .catch(() => showToast('❌ Impossible de partager', 3000));
  }
}

// QR CODE SCANNER
// ═══════════════════════════════════════════════════════════════
var _qrScanInterval = null;
var _qrStream = null;

function openQrScanner() {
  var modal = document.getElementById('qr-scanner-modal');
  if (!modal) return;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  var video = document.getElementById('qr-video');
  var status = document.getElementById('qr-status');
  status.textContent = 'Autorisation caméra…';
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
    .then(function(stream) {
      _qrStream = stream;
      video.srcObject = stream;
      video.setAttribute('playsinline', true);
      video.play();
      status.textContent = 'Pointe vers le QR code';
      _startQrDecode();
    })
    .catch(function(err) {
      status.textContent = '⚠️ Caméra non disponible';
      console.warn('QR cam error:', err);
    });
}

function closeQrScanner() {
  _stopQrScan();
  var modal = document.getElementById('qr-scanner-modal');
  if (modal) modal.style.display = 'none';
  document.body.style.overflow = '';
}

function _stopQrScan() {
  if (_qrScanInterval) { clearInterval(_qrScanInterval); _qrScanInterval = null; }
  if (_qrStream) { _qrStream.getTracks().forEach(function(t){ t.stop(); }); _qrStream = null; }
  var video = document.getElementById('qr-video');
  if (video) { video.srcObject = null; }
}

function _startQrDecode() {
  var video = document.getElementById('qr-video');
  var canvas = document.getElementById('qr-canvas');
  var ctx = canvas.getContext('2d');
  _qrScanInterval = setInterval(function() {
    if (!video || video.readyState !== video.HAVE_ENOUGH_DATA) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
    if (code && code.data) { _onQrFound(code.data); }
  }, 200);
}

function _onQrFound(data) {
  _stopQrScan();
  var match = data.match(/[?&]join=([A-Z0-9]{5})/i) || data.match(/\b([A-Z0-9]{5})\b/i);
  var code = match ? match[1].toUpperCase() : data.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,5);
  var input = document.getElementById('multi-code');
  if (input && code) {
    input.value = code;
    input.style.transition = 'background .3s';
    input.style.background = 'rgba(74,222,128,.25)';
    setTimeout(function(){ input.style.background = ''; }, 800);
  }
  closeQrScanner();
  showToast('✅ Code ' + code + ' scanné !');
}

window.openQrScanner = openQrScanner;
window.closeQrScanner = closeQrScanner;
